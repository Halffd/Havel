name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CC: clang
  CXX: clang++

jobs:
  build-no-llvm:
    name: build (no llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld cmake pkg-config ninja-build ccache \
            libx11-dev libxtst-dev libxrandr-dev libxinerama-dev \
            libxcomposite-dev libxi-dev libxfixes-dev libxdamage-dev \
            libspdlog-dev nlohmann-json3-dev libgtest-dev liblua5.4-dev \
            libpulse-dev libasound2-dev libtesseract-dev libopencv-dev libleptonica-dev

      - name: configure
        run: |
          cmake -S . -B build-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DUSE_CLANG=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_HAVEL_LANG=ON \
            -DENABLE_LLVM=OFF

      - name: build
        run: cmake --build build-debug -j"$(nproc)" --target havel hvtest

      - name: smoke tests
        run: |
          ./build-debug/hvtest --smoke
          ./build-debug/havel run scripts/tests/main/test_hello.hv

  build-with-llvm:
    name: build (llvm + tiering)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld cmake pkg-config ninja-build ccache \
            libx11-dev libxtst-dev libxrandr-dev libxinerama-dev \
            libxcomposite-dev libxi-dev libxfixes-dev libxdamage-dev \
            libspdlog-dev nlohmann-json3-dev libgtest-dev liblua5.4-dev \
            libpulse-dev libasound2-dev libtesseract-dev libopencv-dev libleptonica-dev \
            llvm-dev liblld-dev

      - name: configure
        run: |
          cmake -S . -B build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_LINKER=/usr/bin/ld.lld \
            -DUSE_CLANG=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_HAVEL_LANG=ON \
            -DENABLE_LLVM=ON

      - name: build
        run: cmake --build build-release -j"$(nproc)" --target havel

      - name: core aot
        run: |
          ./build-release/havel --target aot --profile core scripts/tests/aot_core_arith.hv -o /tmp/aot_core_arith
          ./build-release/havel --target aot --profile core scripts/tests/aot_core_control.hv -o /tmp/aot_core_control
          ./build-release/havel --target aot --profile core scripts/tests/aot_core_objects.hv -o /tmp/aot_core_objects

      - name: tiering
        run: |
          HAVEL_TIERING=1 HAVEL_TIER1_THRESHOLD=5 HAVEL_TIER2_THRESHOLD=10 HAVEL_TIER2_FLUSH=1 \
            ./build-release/havel --target jit --profile core scripts/tests/tiering_trigger.hv \
            > /tmp/tiering_trigger.log 2>&1
          HAVEL_TIERING=1 HAVEL_TIER1_THRESHOLD=5 HAVEL_TIER2_THRESHOLD=10 HAVEL_TIER2_FLUSH=1 \
            ./build-release/havel --target jit --profile core scripts/tests/tiering_dupe_guard.hv \
            > /tmp/tiering_dupe_guard.log 2>&1
          grep -q "tier1=2" /tmp/tiering_trigger.log
          grep -q "tier2_compiled=1" /tmp/tiering_trigger.log
          grep -q "tier1=2" /tmp/tiering_dupe_guard.log
          grep -q "tier2_compiled=1" /tmp/tiering_dupe_guard.log
