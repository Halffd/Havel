name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

env:
  CC: clang
  CXX: clang++

jobs:
  build-debug:
    name: debug (no llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libx11-dev libxtst-dev libxrandr-dev libxinerama-dev \
            libxcomposite-dev libxi-dev libxfixes-dev libxdamage-dev \
            libspdlog-dev nlohmann-json3-dev \
            libgtest-dev liblua5.4-dev \
            libpulse-dev libasound2-dev \
            libtesseract-dev libopencv-dev libleptonica-dev \
            pkg-config cmake

      - name: configure
        run: |
          cmake -B build-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DUSE_CLANG=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_HAVEL_LANG=ON \
            -DENABLE_LLVM=OFF

      - name: build
        run: cmake --build build-debug -j$(nproc)

      - name: bytecode smoke test
        run: ./build-debug/havel-bytecode-smoke

      - name: unit tests
        working-directory: build-debug
        run: ctest --output-on-failure -j$(nproc)

  build-release:
    name: release (no llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libx11-dev libxtst-dev libxrandr-dev libxinerama-dev \
            libxcomposite-dev libxi-dev libxfixes-dev libxdamage-dev \
            libspdlog-dev nlohmann-json3-dev \
            libgtest-dev liblua5.4-dev \
            libpulse-dev libasound2-dev \
            libtesseract-dev libopencv-dev libleptonica-dev \
            pkg-config cmake

      - name: configure
        run: |
          cmake -B build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DUSE_CLANG=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_HAVEL_LANG=ON \
            -DENABLE_LLVM=OFF

      - name: build
        run: cmake --build build-release -j$(nproc)

      - name: bytecode smoke test
        run: ./build-release/havel-bytecode-smoke

      - name: unit tests
        working-directory: build-release
        run: ctest --output-on-failure -j$(nproc)

  build-with-llvm:
    name: debug (with llvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libx11-dev libxtst-dev libxrandr-dev libxinerama-dev \
            libxcomposite-dev libxi-dev libxfixes-dev libxdamage-dev \
            libspdlog-dev nlohmann-json3-dev \
            libgtest-dev liblua5.4-dev \
            libpulse-dev libasound2-dev \
            libtesseract-dev libopencv-dev libleptonica-dev \
            llvm-dev liblld-dev \
            pkg-config cmake

      - name: configure
        run: |
          cmake -B build-llvm \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DUSE_CLANG=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_HAVEL_LANG=ON \
            -DENABLE_LLVM=ON

      - name: build
        run: cmake --build build-llvm -j$(nproc)

      - name: bytecode smoke test
        run: ./build-llvm/havel-bytecode-smoke

      - name: unit tests
        working-directory: build-llvm
        run: ctest --output-on-failure -j$(nproc)

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libx11-dev libxtst-dev libxrandr-dev libxinerama-dev \
            libxcomposite-dev libxi-dev libxfixes-dev libxdamage-dev \
            libspdlog-dev nlohmann-json3-dev \
            libgtest-dev liblua5.4-dev \
            libpulse-dev libasound2-dev \
            libtesseract-dev libopencv-dev libleptonica-dev \
            llvm-dev \
            pkg-config cmake

      - name: configure
        run: |
          cmake -B build-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DUSE_CLANG=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_HAVEL_LANG=ON \
            -DENABLE_LLVM=OFF \
            -DENABLE_COVERAGE=ON

      - name: build
        run: cmake --build build-cov -j$(nproc)

      - name: run tests
        working-directory: build-cov
        run: ctest --output-on-failure -j$(nproc)

      - name: generate coverage report
        run: |
          llvm-profdata merge -sparse build-cov/default.profdata -o build-cov/merged.profdata 2>/dev/null || true
          for bin in build-cov/havel_lang_tests build-cov/havel-bytecode-smoke; do
            if [ -f "$bin" ]; then
              llvm-cov export "$bin" \
                --instr-profile=build-cov/merged.profdata \
                --format=lcov > "${bin##*/}.lcov" 2>/dev/null || true
            fi
          done
          echo "Coverage data generated"
          ls -la *.lcov 2>/dev/null || echo "No lcov files (profraw may be empty)"

      - name: upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: "*.lcov"
          if-no-files-found: ignore

  havel-scripts:
    name: havel script tests
    runs-on: ubuntu-latest
    needs: build-debug
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libx11-dev libxtst-dev libxrandr-dev libxinerama-dev \
            libxcomposite-dev libxi-dev libxfixes-dev libxdamage-dev \
            libspdlog-dev nlohmann-json3-dev \
            libgtest-dev liblua5.4-dev \
            libpulse-dev libasound2-dev \
            libtesseract-dev libopencv-dev libleptonica-dev \
            pkg-config cmake

      - name: configure and build
        run: |
          cmake -B build-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DUSE_CLANG=ON \
            -DENABLE_TESTS=ON \
            -DENABLE_HAVEL_LANG=ON \
            -DENABLE_LLVM=OFF
          cmake --build build-debug -j$(nproc)

      - name: run havel test scripts
        run: |
          pass=0
          fail=0
          for script in scripts/tests/test_*.hv; do
            if [ -f "$script" ]; then
              echo "running: $script"
              if ./build-debug/havel "$script" 2>&1; then
                pass=$((pass + 1))
              else
                fail=$((fail + 1))
                echo "FAILED: $script"
              fi
            fi
          done
          echo "havel scripts: $pass passed, $fail failed"
